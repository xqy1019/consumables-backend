spring:
  profiles:
    active: dev
  application:
    name: medical-system
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

server:
  port: 8081

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: medical-system-jwt-secret-key-2024-very-long-string-at-least-256-bits-for-security
  expiration: 86400000

